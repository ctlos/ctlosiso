LABEL arch
TEXT HELP
Boot the ISO in Bios/legacy
with open source drivers
ENDTEXT
MENU LABEL Boot Ctlos Linux All GPUs (BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 i915.modeset=1 radeon.modeset=1 nvme_load=yes

# Fallback (nomodeset)
LABEL arch-nm
TEXT HELP
Boot the ISO in Bios/legacy
Disables graphics driver modesetting for safer boot.
ENDTEXT
MENU LABEL Boot Ctlos Linux Fallback nomodeset (BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr nomodeset nvme_load=yes

# Copy to RAM boot option
LABEL arch-ctr
TEXT HELP
Boot the ISO in Bios/legacy
ENDTEXT
MENU LABEL Boot Ctlos Linux Copy to RAM (BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram cow_spacesize=10G driver=free nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr nvme_load=yes