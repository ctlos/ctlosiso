LABEL arch64_nbd
TEXT HELP
Boot the Ctlos Linux install medium using NBD.
It allows you to install Ctlos Linux or perform system maintenance.
ENDTEXT
MENU LABEL Ctlos Linux install medium (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

