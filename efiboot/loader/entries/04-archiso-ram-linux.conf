title   Ctlos Linux (%ARCH%, UEFI, Copy to RAM)
sort-key 04
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram cow_spacesize=10G driver=free nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr