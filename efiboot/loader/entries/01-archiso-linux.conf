title   Ctlos Linux (%ARCH%, UEFI, open source)
sort-key 01
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm nouveau.modeset=1 i915.modeset=1 radeon.modeset=1 nvme_load=yes